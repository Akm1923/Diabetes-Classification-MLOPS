data:
  test_size: 0.20
  random_state: 42

models:
  LogisticRegression:
    C: 10
    solver: lbfgs
    max_iter: 1000
    penalty: l2

  SVC:
    C: 100
    kernel: rbf
    gamma: scale

  RandomForest:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    criterion: gini
    random_state: 42

  DecisionTree:
    max_depth: null
    min_samples_split: 2
    min_samples_leaf: 1
    criterion: gini
    random_state: 42

  GradientBoosting:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 3
    min_samples_split: 2
    min_samples_leaf: 1
    subsample: 1.0
    loss: log_loss
    random_state: 42
