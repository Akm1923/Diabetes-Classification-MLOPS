stages:
  ingestion:
    cmd: python src/ingestion.py
    deps:
      - src/ingestion.py
      - data/raw/diabetes.csv
    outs:
      - data/interim/cleaned.csv

  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/interim/cleaned.csv
    outs:
      - data/processed/engineered.csv

  data_splitting:
    cmd: python src/data_splitting.py
    deps:
      - src/data_splitting.py
      - data/processed/engineered.csv
    outs:
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv

  training:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/X_train.csv
      - data/processed/y_train.csv
    outs:
      - models/

  evaluation:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - data/processed/X_test.csv
      - data/processed/y_test.csv
      - models/
    metrics:
      - reports/metrics.json:
          cache: false
    plots:
      - reports/cm_LogisticRegression.png
      - reports/cm_SVC.png
      - reports/cm_RandomForest.png
      - reports/cm_DecisionTree.png
      - reports/cm_GradientBoosting.png
